<div class="mission-control">
    <header class="top-bar">
        <div class="header-left">
            <span class="terminal-icon">⌘</span>
            <h1 class="header-title">MISSION CONTROL</h1>
        </div>
        <div class="header-right">
            <span class="commander-avatar">👤</span>
        </div>
    </header>

    <main class="roster-container">
        <div class="heroes-grid">
            @for (item of heroes(); track $index) {
                <app-item-heroe [heroe]="item" (cambioPoder)="onCambioPoder($event)"></app-item-heroe>
            }@empty {
                <div class="empty-state">
                    <p>NO HÉROES REGISTRADOS</p>
                </div>
            }
        </div>
    </main>
