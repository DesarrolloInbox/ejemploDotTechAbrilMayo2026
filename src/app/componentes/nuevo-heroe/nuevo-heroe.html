<div class="hero-form-container">
    <h3>Agrega un nuevo héroe</h3>

    <form [formGroup]="heroeForm">
        <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" formControlName="nombre" 
                id="nombre" name="nombre" required
                placeholder="Ingresa el nombre del héroe">
        </div>

        <div class="poderes-group" formGroupName="poderes">
            <div class="form-group">
                <label for="inteligencia">Inteligencia</label>
                <input type="number" formControlName="inteligencia" 
                    id="inteligencia" name="inteligencia" required
                    min="0" max="100">
            </div>
            <div class="form-group">
                <label for="velocidad">Velocidad</label>
                <input type="number" formControlName="velocidad" 
                    id="velocidad" name="velocidad" required
                    min="0" max="100">
            </div>
        </div>

        <div class="form-group">
            <label for="imagen">Imagen</label>
            <select formControlName="imagen" id="imagen" name="imagen" required>
                <option selected value="imagen1.jpg">Imagen 1</option>
                <option value="imagen2.jpg">Imagen 2</option>
                <option value="imagen3.jpg">Imagen 3</option>
            </select>
        </div>

        <div class="form-group">
            <label for="bando">Bando</label>
            <select formControlName="bando" id="bando" name="bando" required>
                <option selected value="bueno">Soy un Héroe</option>
                <option value="malo">Soy un Villano</option>
            </select>
        </div>

        <div class="button-group">
            <button type="button" (click)="agregarHeroe()" [disabled]="heroeForm.invalid">Crear</button>
        </div>
    </form>
</div>
